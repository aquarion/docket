name: Laravel and Browser Tests

on:
  push:
    branches: [main, 'release/*', 'dependabot-updates']
  pull_request:
    branches: [main', 'release/*']

jobs:
  laravel-browser-tests:
    name: Laravel and Browser Tests
    runs-on: ubuntu-latest

    services:
      chromedriver:
        image: selenium/standalone-chrome:latest
        options: >-
          --health-cmd "curl http://127.0.0.1:4444/status"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 3
        ports:
          - 4444:4444

    steps:
      - uses: actions/checkout@v6

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: /tmp/composer-cache
          key: ${{ runner.os }}-${{ hashFiles('**/composer.lock') }}

      - name: Create required directories
        run: |
          mkdir -p bootstrap/cache storage/logs storage/framework/cache storage/framework/sessions storage/framework/views
      - name: Directory Permissions
        run: sudo chmod -R 777 storage bootstrap/cache

      # PHP Setup first
      - name: PHP - Configure Version
        uses: shivammathur/setup-php@v2
        with:
          php-version: 8.4

      - name: Install Composer dependencies
        uses: php-actions/composer@v6
        with:
          php_version: 8.4
          args: --prefer-dist --no-progress --ignore-platform-reqs

      # File management
      - name: Copy .env
        run: php -r "file_exists('.env') || copy('.env.example', '.env');"

      # Node Setup
      - name: Use Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20.x"
      - name: NPM - Install dependencies
        run: npm ci
      - name: Build assets with Vite
        run: npm run build
      - name: Verify Vite build output
        run: |
          test -d public/build || (echo "Vite build directory not found"; exit 1)
          test -f public/build/manifest.json || (echo "Vite manifest not found"; exit 1)

      - name: Check iOS 12 JS compatibility
        run: |
          MODERN_BUNDLE=$(grep -o 'assets/app-[^"]*\.js' public/build/manifest.json | grep -v legacy | head -1)
          POLYFILLS_BUNDLE=$(grep -o 'assets/polyfills-legacy-[^"]*\.js' public/build/manifest.json | head -1)

          echo "Checking modern bundle: $MODERN_BUNDLE"
          echo "Checking polyfills bundle: $POLYFILLS_BUNDLE"

          # @vitejs/plugin-legacy v8 injects a data: URL import that iOS 12 can't load
          if grep -qP "^import'data:" "public/build/$MODERN_BUNDLE"; then
            echo "FAIL: data: URL guard found in modern bundle — iOS 12 will fail silently"
            exit 1
          fi
          echo "PASS: No data: URL guard in modern bundle"

          # Optional chaining is ES2020 — iOS 12 (Safari 12) doesn't support it
          if grep -qP '\?\.' "public/build/$MODERN_BUNDLE"; then
            echo "FAIL: Optional chaining (?.) found in modern bundle — iOS 12 will throw SyntaxError"
            exit 1
          fi
          echo "PASS: No optional chaining in modern bundle"

          # Object.hasOwn is ES2022 — must not appear in the polyfills bundle itself
          if grep -qP 'Object\.hasOwn\b' "public/build/$POLYFILLS_BUNDLE"; then
            echo "FAIL: Object.hasOwn found in polyfills bundle — not available on iOS 12"
            exit 1
          fi
          echo "PASS: No Object.hasOwn in polyfills bundle"

      # Laravel Setup
      - name: Generate key
        run: php artisan key:generate
      - name: Generate testing key
        run: php artisan key:generate --env=testing
      - name: Create Database
        run: |
          mkdir -p database
          touch database/database.sqlite

      - name: Execute tests (Unit and Feature tests) via PHPUnit
        env:
          DB_CONNECTION: sqlite
          DB_DATABASE: database/database.sqlite
        run: vendor/bin/phpunit

      # Browser Tests

      - name: Detect host IP
        id: host-ip
        run: |
          HOST_IP=$(hostname -I | awk '{print $1}')
          echo "ip=${HOST_IP}" >> "$GITHUB_OUTPUT"
          echo "Detected host IP: ${HOST_IP}"

      - name: Start Laravel server
        run: php artisan serve --env=testing --host=0.0.0.0 &
        env:
          APP_URL: http://${{ steps.host-ip.outputs.ip }}:8000
          SESSION_DRIVER: file
      - name: Check the IP address
        run: echo "Host IP is ${{ steps.host-ip.outputs.ip }}"
      - name: Wait for server
        # Wait for Laravel development server to become available
        shell: bash
        run: |
          sleep 5
          LOOPS=10
          until curl --max-time 5 -f http://${{ steps.host-ip.outputs.ip }}:8000; do
            if [ $LOOPS -eq 0 ]; then
              echo "=== Server failed to start, showing logs ==="
              cat storage/logs/laravel.log 2>/dev/null || echo "Log file not found"
              exit 1
            fi
            sleep 5
            LOOPS=$((LOOPS-1))
            echo "Waiting for server... ($LOOPS attempts remaining)"
          done
          echo "Server is ready!"

      - name: Execute browser tests via Dusk
        run: php artisan dusk --env=testing
        env:
          APP_URL: http://${{ steps.host-ip.outputs.ip }}:8000
          SESSION_DRIVER: file
